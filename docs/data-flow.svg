  <rect x="850" y="139" width="3" height="82" rx="1" fill="#4ce89a"/>
  <text x="866" y="159" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#4ce89a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">TECH STACK</text>
