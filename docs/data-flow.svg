  <text x="466" y="400" font-size="10" fill="#a07030" font-family="'SF Mono', Menlo, 'Courier New', monospace">/account-name/ folders</text>

  <!-- Arrow 2 -->
  <line x1="774" y1="265" x2="824" y2="265" stroke="#2e3038" stroke-width="2.5" marker-end="url(#arrow)"/>

